name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Init available submodules
        run: |
          git submodule update --init ai/src/main/cpp/mnn || true
          git submodule update --init material3/material-color-utilities || true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore app/orangechat.jks \
            -alias orangechat \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -storepass ${{ secrets.KEY_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=OrangeChat, OU=App, O=Personal, L=Unknown, S=Unknown, C=CN"

      - name: Write local.properties
        run: |
          echo "storeFile=orangechat.jks" > local.properties
          echo "storePassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
          echo "keyAlias=orangechat" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Write google-services.json
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"orangechat-app","storage_bucket":"orangechat-app.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.ojhdt.orangechat"}},"oauth_client":[],"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: orangechat-apk
          path: app/build/outputs/apk/release/*.apk
